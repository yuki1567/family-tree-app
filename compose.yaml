services:
  workspace:
    build:
      context: .
      dockerfile: docker/workspace/Dockerfile
    working_dir: /workspace
    volumes:
      # ソースは bind mount（編集を即 HMR / tsx watch へ）。node_modules はボリュームに分離。
      - .:/workspace
      - workspace-node-modules:/workspace/node_modules
      - frontend-node-modules:/workspace/apps/frontend/node_modules
      - backend-node-modules:/workspace/apps/backend/node_modules
      - shared-node-modules:/workspace/packages/shared/node_modules
      - pnpm-store:/pnpm-store
    ports:
      - "3000:3000"
      - "4000:4000"
    environment:
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-501a5e0e-0a86-4015-a50e-24e203004754}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${INFISICAL_UNIVERSAL_AUTH_CLIENT_ID:-}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET:-}
    depends_on:
      - db

  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    environment:
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-501a5e0e-0a86-4015-a50e-24e203004754}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${INFISICAL_UNIVERSAL_AUTH_CLIENT_ID:-}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET:-}
    ports:
      - "5432:5432"

volumes:
  workspace-node-modules:
  frontend-node-modules:
  backend-node-modules:
  shared-node-modules:
  pnpm-store:
